name: Odoo Poll (every 30 min)

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: # allow manual trigger from GitHub Actions UI

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger odoo-poll edge function
        run: |
          curl -s -X POST \
            ${{ secrets.SUPABASE_URL }}/functions/v1/odoo-poll \
            -H "Authorization: Bearer ${{ secrets.ODOO_WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            --fail-with-body
